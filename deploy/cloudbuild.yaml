# Build + deploy ORGuard to Cloud Run.
# Substitutions: _REGION, _AR (Artifact Registry repo), _API_URL (backend URL for
# the frontend build). Run: gcloud builds submit --config deploy/cloudbuild.yaml
steps:
  # --- Backend image ---
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-backend:$SHORT_SHA", "./backend"]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-backend:$SHORT_SHA"]

  # --- Frontend image (bakes the backend URL) ---
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--build-arg"
      - "VITE_API_BASE=${_API_URL}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-frontend:$SHORT_SHA"
      - "./frontend"
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-frontend:$SHORT_SHA"]

  # --- Deploy backend (more memory for torch/mediapipe; 1 instance keeps the
  #     in-memory session world warm for the demo) ---
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - orguard-backend
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-backend:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=4Gi"
      - "--cpu=2"
      - "--min-instances=1"
      - "--max-instances=1"
      - "--timeout=3600"

  # --- Deploy frontend ---
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - orguard-frontend
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-frontend:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"

substitutions:
  _REGION: us-central1
  _AR: orguard
  _API_URL: https://orguard-backend-REPLACE.run.app

options:
  machineType: E2_HIGHCPU_8
images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-backend:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR}/orguard-frontend:$SHORT_SHA"
