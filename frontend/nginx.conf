server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: proxy API/WS to the backend when frontend + backend share a host.
  # For the split Cloud Run deployment, set VITE_API_BASE at build time instead
  # and point it at the backend service URL.
  #
  # location /api/ { proxy_pass http://backend:8080; }
  # location /ws/  { proxy_pass http://backend:8080; proxy_http_version 1.1;
  #                  proxy_set_header Upgrade $http_upgrade;
  #                  proxy_set_header Connection "upgrade"; }
}
