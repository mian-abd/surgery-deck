# ORGuard frontend nginx config (TEMPLATE).
#
# The frontend Dockerfile copies this to /etc/nginx/templates/default.conf.template
# so the official nginx entrypoint runs envsubst on it at container start,
# substituting ${PORT} and ${BACKEND_URL} from the environment. Other nginx
# runtime variables ($uri, $http_upgrade, ...) are left untouched because
# envsubst only replaces names that are set in the environment.
#
# Two deployment modes:
#  1. Same-origin (docker-compose, or single host): the Vite app is built with
#     an EMPTY VITE_API_BASE so it uses relative URLs; nginx proxies /api, /ws
#     and /evidence to ${BACKEND_URL}. No CORS needed. Set BACKEND_URL to the
#     backend origin (e.g. http://backend:8080).
#  2. Split Cloud Run (default cloudbuild): the Vite app is built with
#     VITE_API_BASE=<backend run.app URL> so the browser calls the backend
#     directly. The proxy blocks below are then unused (the browser never hits
#     the frontend's /api). Using a variable in proxy_pass + resolver means
#     nginx starts fine even when ${BACKEND_URL} is unreachable in this mode.

server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS for runtime resolution of the proxy target. 127.0.0.11 is Docker's
    # embedded DNS (docker-compose); the public resolver covers other hosts.
    resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

    # gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache the content-hashed Vite assets; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Reverse proxy to the backend (same-origin mode) ---
    location /api/ {
        set $backend ${BACKEND_URL};
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Evidence frames served by the backend (local storage backend). With the
    # GCS backend, evidence URLs are absolute storage.googleapis.com links and
    # never pass through here.
    location /evidence/ {
        set $backend ${BACKEND_URL};
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoints: /ws/ingest/{camera_id} and /ws/session/{session_id}.
    location /ws/ {
        set $backend ${BACKEND_URL};
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep long-lived OR sessions open (match backend --timeout=3600).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Lightweight container health endpoint for the frontend service itself.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
